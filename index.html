<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Image Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Dog Image Generator</h1>
        <p class="subtitle">Describe your dream dog and watch it come to life!</p>
        
        <div class="input-section">
            <label for="breedSelect">Select a dog breed:</label>
            <select id="breedSelect">
                <option value="">Loading breeds...</option>
            </select>
            <div class="button-row">
                <button id="generateBtn">Get Random Dog</button>
                <button id="anotherBtn" class="secondary" disabled>Another One</button>
            </div>
        </div>

        <div class="loading hidden" id="loading" aria-live="polite" role="status">
            <div class="spinner" aria-hidden="true"></div>
            <p id="loadingText">Creating your dog...</p>
        </div>

        <div class="result-section hidden" id="resultSection">
            <img id="resultImage" alt="Generated dog image">
            <button id="favoriteBtn" class="favorite-btn" disabled>Save to Favorites</button>
        </div>

        <section class="favorites" id="favoritesSection" aria-labelledby="favoritesHeading">
            <div class="favorites-header">
                <h2 id="favoritesHeading">Favorites</h2>
                <button id="clearFavoritesBtn" class="tertiary" disabled>Clear All</button>
            </div>
            <p id="emptyFavorites" class="muted">No favorites yet. Save a few dogs you love.</p>
            <ul id="favoritesList" class="favorites-list" aria-live="polite"></ul>
        </section>

        <div class="error hidden" id="error" aria-live="assertive" role="alert"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
